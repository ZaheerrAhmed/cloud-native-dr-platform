# ============================================================
# Fluent Bit Helm values — log shipper to OpenSearch (SIEM)
# Collects: container logs, Kubernetes system logs, audit logs
# helm upgrade --install fluent-bit fluent/fluent-bit -n logging -f this-file.yaml
# ============================================================

config:
  service: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

  inputs: |
    # All container logs
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Kubernetes system logs
    [INPUT]
        Name   systemd
        Tag    host.*
        Read_From_Tail On

  filters: |
    # Enrich with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # Add DR platform metadata
    # cluster_name and region are overridden per-cluster by Ansible:
    #   -e "fluent_cluster_name=dr-platform-primary-eks" -e "fluent_region=us-east-1"
    [FILTER]
        Name   record_modifier
        Match  *
        Record cluster_name  ${CLUSTER_NAME}
        Record region        ${AWS_REGION}
        Record environment   primary
        Record platform      dr-status-monitor

    # Drop health check noise
    [FILTER]
        Name   grep
        Match  kube.*
        Exclude log GET /health

  outputs: |
    # Ship all logs to OpenSearch (SIEM)
    [OUTPUT]
        Name            opensearch
        Match           *
        Host            opensearch-cluster-master.logging.svc.cluster.local
        Port            9200
        Index           dr-platform-logs
        Type            _doc
        HTTP_User       admin
        HTTP_Passwd     ${OPENSEARCH_PASSWORD}
        tls             Off
        Replace_Dots    On
        Retry_Limit     5

    # Ship critical/error logs to CloudWatch too (for Lambda trigger)
    [OUTPUT]
        Name              cloudwatch_logs
        Match             kube.*
        region            ${AWS_REGION}
        log_group_name    ${LOG_GROUP_NAME}
        log_stream_prefix pod/
        auto_create_group true

# Environment variables (CLUSTER_NAME, AWS_REGION, LOG_GROUP_NAME injected via --set by Ansible)
env:
  - name: OPENSEARCH_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-credentials
        key: password

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
