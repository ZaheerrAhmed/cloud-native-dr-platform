# ============================================================
# Fluent Bit Helm values — DR cluster (us-west-2)
# helm upgrade --install fluent-bit fluent/fluent-bit -n logging \
#   --kube-context dr -f this-file.yaml
# ============================================================

config:
  service: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [INPUT]
        Name   systemd
        Tag    host.*
        Read_From_Tail On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name   record_modifier
        Match  *
        Record cluster_name  dr-platform-dr-eks
        Record region        us-west-2
        Record environment   dr

    [FILTER]
        Name   grep
        Match  kube.*
        Exclude log GET /health

  outputs: |
    # OpenSearch 3.x requires Suppress_Type_Name On — Type _doc is not supported
    [OUTPUT]
        Name              opensearch
        Match             *
        Host              opensearch-cluster-master.logging.svc.cluster.local
        Port              9200
        Index             dr-platform-logs
        Suppress_Type_Name On
        tls               Off
        Replace_Dots      On
        Retry_Limit       5

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
