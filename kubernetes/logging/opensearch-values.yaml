# ============================================================
# OpenSearch Helm values — SIEM / centralized logging
# Collects logs from: EKS pods, RDS (via CloudWatch), Lambda,
#   VPC flow logs, Kubernetes audit logs
# helm upgrade --install opensearch opensearch/opensearch -n logging -f this-file.yaml
# ============================================================

clusterName: dr-platform-siem
nodeGroup: master

masterService: opensearch-cluster-master

replicas: 1   # Single node for cost savings; scale to 2 for production

# Storage
persistence:
  enabled: true
  storageClass: gp2
  accessModes: [ReadWriteOnce]
  size: 30Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

opensearchJavaOpts: "-Xmx1g -Xms1g"

config:
  opensearch.yml: |
    cluster.name: dr-platform-siem
    network.host: 0.0.0.0
    plugins.security.disabled: true

extraEnvs:
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"
  - name: DISABLE_PERFORMANCE_ANALYZER_AGENT_CLI
    value: "true"

service:
  type: ClusterIP
  port: 9200
