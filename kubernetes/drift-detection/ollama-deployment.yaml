---
# Ollama — self-hosted LLM (llama3.2 model)
# OPTIONAL — only deploy this if you do NOT have a Groq API key.
#
# Recommended setup:
#   WITH Groq API key (free at console.groq.com):
#     Do NOT deploy this file. Uses llama3-70b remotely, 0 RAM overhead.
#   WITHOUT Groq API key:
#     Deploy this file. Uses llama3.2 locally, needs 3-4GB RAM.
#     Requires t3.xlarge nodes (not t3.large — not enough RAM).
#
# To deploy Ollama (only when no Groq key):
#   kubectl apply -f kubernetes/drift-detection/ollama-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: drift-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        # Pull llama3.2 model on first start
        - name: pull-model
          image: ollama/ollama:latest
          command: ["sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && pkill ollama"]
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 1000m
              memory: 3Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: drift-detection
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: gp2
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: drift-detection
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
